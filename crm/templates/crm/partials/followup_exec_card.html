<div class="fu-exec-card fu-exec--{{ bucket }}" id="fu-exec-{{ fu.pk }}">
  <div class="fu-exec-card__main">
    <a href="{% url 'crm:lead_detail' fu.lead_id %}" class="fu-exec-name">{{ fu.lead.name }}</a>
    {% if fu.lead.phone %}
    <a href="tel:{{ fu.lead.phone }}" class="fu-exec-phone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;display:inline;vertical-align:middle;">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12 19.79 19.79 0 0 1 1.93 3.28 2 2 0 0 1 3.91 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 15.92z"/>
      </svg>
      {{ fu.lead.phone }}
    </a>
    {% endif %}
    <div class="fu-exec-time">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;display:inline;vertical-align:middle;margin-right:3px;">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      {{ fu.datetime|date:"M j · H:i" }}
    </div>
    {% if fu.note %}
    <p class="fu-exec-note" style="margin-top:4px;">{{ fu.note|truncatewords:15 }}</p>
    {% endif %}
  </div>

  <div class="fu-exec-card__actions">
    <button type="button" class="fu-btn fu-btn--done"
      hx-post="{% url 'crm:followup_done' fu.pk %}"
      hx-target="closest .fu-exec-card"
      hx-swap="delete">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Done
    </button>

    <form class="fu-resched" hx-post="{% url 'crm:followup_reschedule' fu.pk %}" hx-target="#fu-exec-{{ fu.pk }}" hx-swap="outerHTML">
      {% csrf_token %}
      <input type="datetime-local" name="new_datetime" required class="fu-resched-input"
        {% if fu.datetime %}value="{{ fu.datetime|date:'Y-m-d' }}T{{ fu.datetime|time:'H:i' }}"{% endif %}>
      <button type="submit" class="fu-btn fu-btn--move">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Reschedule
      </button>
    </form>

    {% if reschedule_error %}
    <p class="exec-err">{{ reschedule_error }}</p>
    {% endif %}
  </div>
</div>
