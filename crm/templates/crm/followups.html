{% extends "crm/base.html" %}
{% block title %}Follow-ups{% endblock %}
{% block page_title %}Follow-ups{% endblock %}

{% block content %}
<!-- Page header -->
<div class="page-header">
  <div>
    <h1>Follow-up Queue</h1>
    <p>Mark done or reschedule — no page reloads.</p>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
    <a href="{% url 'crm:leads' %}"
       hx-get="{% url 'crm:leads' %}"
       hx-target="#crm-main-content"
       hx-select="#crm-main-content"
       hx-swap="outerHTML"
       hx-push-url="true"
       class="btn btn-outline btn-sm">View All Leads</a>
  </div>
</div>

{% include "crm/partials/followups_list.html" %}
{% endblock %}
